spring.datasource.url=jdbc:mysql://localhost:3306/usermanagement
spring.datasource.username=root
spring.datasource.password=Kinu@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8087

jwt.secret=ChangeThisSecretKeyToAtLeast32CharactersLong!!
jwt.expiration-ms=3600000
# application.properties


# -------------------------------
# -------------------------------
# Kafka Broker Connection
# -------------------------------
spring.kafka.bootstrap-servers=localhost:9092

# -------------------------------
# Producer Configuration
# -------------------------------
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Optional: default topic for KafkaTemplate
spring.kafka.template.default-topic=test-topic

# -------------------------------
# Consumer Configuration
# -------------------------------
spring.kafka.consumer.group-id=my-group
spring.kafka.consumer.auto-offset-reset=earliest


# -------------------------------
# Admin Client Configuration
# -------------------------------
spring.kafka.admin.fail-fast=true
spring.kafka.admin.client-id=adminclient-1
spring.kafka.admin.properties.request.timeout.ms=5000
spring.kafka.admin.properties.retry.backoff.ms=1000

# Optional: automatically create topics if missing (good for dev/testing)
spring.kafka.admin.auto-create-topics=true

